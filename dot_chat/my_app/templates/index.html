{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dot Chat · Chat Room</title>
    <!-- Bootstrap 5 + Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #dc3545 0%, #8b0000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 1rem;
        }

        .chat-container {
            background: rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 2rem 1.8rem;
            box-shadow: 0 20px 50px rgba(180, 20, 30, 0.3);
            max-width: 580px;
            width: 100%;
        }

        .chat-header {
            text-align: center;
            padding-bottom: 1.2rem;

        }

        .chat-header h2 {
            font-weight: 700;
            color: #1e1e1e;
            letter-spacing: -0.3px;
        }

        .chat-input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0.2rem 0;
        }

        .btn-send {
            background: linear-gradient(135deg, #dc3545, #8b0000);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 12px rgba(180, 20, 30, 0.2);
            width: auto;
            min-width: 180px;
            cursor: pointer;
        }

        .btn-send:hover {
            opacity: 0.85;
            transform: scale(1.02);
        }

        @media (max-width: 480px) {
            .chat-container { padding: 1.2rem; }
            .btn-send { padding: 12px 24px; font-size: 0.95rem; min-width: 150px; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>Welcome To .chat</h2>

<img src="{% static 'images/logo.jpg' %}" alt="logo" width=150>
        </div>
        <div class="chat-input-group">
            <a href="/register"><button class="btn-send">Tap To Begin</button></a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
