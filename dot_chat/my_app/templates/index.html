<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dot Chat · Chat Room</title>
    <!-- Bootstrap 5 + Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- minimal & clean --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #dc3545 0%, #8b0000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 1rem;
        }

        .chat-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 2rem 1.8rem;
            box-shadow: 0 20px 50px rgba(180, 20, 30, 0.3);
            max-width: 580px;
            width: 100%;
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .chat-header {
            text-align: center;
           
            padding-bottom: 1.2rem;
            border-bottom: 2px solid #f0f0f0;
        }

        .chat-header h2 {
            font-weight: 700;
            color: #1e1e1e;
            letter-spacing: -0.3px;
        }

        .chat-header h2 i {
            color: #dc3545;
        }

        .status-badge {
            font-size: 0.85rem;
            font-weight: 400;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #2c3e50;
            background: #f1f3f5;
            padding: 4px 14px 4px 10px;
            border-radius: 40px;
            margin-top: 4px;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #28a745;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* ----- messages ----- */
        .chat-messages {
            background: #f8f9fc;
            border-radius: 18px;
            padding: 1.2rem 1rem;
            min-height: 280px;
            max-height: 380px;
            overflow-y: auto;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 12px;
            padding: 10px 16px;
            border-radius: 18px;
            max-width: 78%;
            animation: slideIn 0.25s ease;
            line-height: 1.4;
            word-break: break-word;
        }

        @keyframes slideIn {
            0% { opacity: 0; transform: translateX(-6px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .message-sent {
            background: linear-gradient(135deg, #dc3545, #a00020);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message-received {
            background: #ffe9e9;
            color: #1e1e1e;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border-left: 3px solid #dc3545;
        }

        .message-time {
            font-size: 0.65rem;
            opacity: 0.7;
            margin-top: 5px;
            display: block;
        }

        /* ----- input: button centered ----- */
        .chat-input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0.2rem 0;
        }

        .btn-send {
            background: linear-gradient(135deg, #dc3545, #8b0000);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.3px;
            transition: 0.2s;
            cursor: default;  /* non-interactive placeholder */
            opacity: 0.9;
            box-shadow: 0 4px 12px rgba(180, 20, 30, 0.2);
            width: auto;
            min-width: 180px;
        }

        /* remove any extra buttons / back links */
        .btn-back, .notification-badge {
            display: none !important;
        }

        /* scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #e9ecef;
            border-radius: 10px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #dc3545;
            border-radius: 10px;
        }

        @media (max-width: 480px) {
            .chat-container { padding: 1.2rem; }
            .message { max-width: 88%; }
            .btn-send { padding: 12px 24px; font-size: 0.95rem; min-width: 150px; }
        }
    </style>
</head>
<body>
    <div class="chat-container">

        <!-- header: only title + status -->
        <div class="chat-header">
            <h2>
                <i class="fas fa-comment-dots"></i> Dot Chat
            </h2>
            <div class="status-badge">
                <span class="status-dot"></span> Online
            </div>
        </div>

        <!-- messages -->
        <div class="chat-messages" id="chatMessages">
            <div class="message message-received">
                Welcome to Dot Chat! 👋
                <span class="message-time">Just now</span>
            </div>
            <div class="message message-sent">
                Hey there! Ready to chat? 😊
                <span class="message-time">Just now</span>
            </div>
        </div>

        <!-- input: centered "Tap To Begin" button -->
        <div class="chat-input-group">
            <a href="/home"><button class="btn-send">Tap To Begin</button></a>
        </div>

    </div>
    <!-- bootstrap bundle (kept for potential future use) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
